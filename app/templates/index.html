<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;padding:2rem 1rem}
    .container{max-width:640px;margin:0 auto}
    h1{font-size:1.8rem;font-weight:700;margin-bottom:1.5rem;color:#1a1a2e}
    h1 span{color:#4f46e5}
    .card{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    input,textarea{width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:.6rem .9rem;font-size:.95rem;outline:none;margin-bottom:.75rem}
    input:focus,textarea:focus{border-color:#4f46e5}
    textarea{resize:vertical;min-height:64px}
    button{background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:.65rem 1.4rem;font-size:.9rem;font-weight:600;cursor:pointer}
    button:hover{background:#4338ca}
    button.danger{background:#ef4444}
    button.danger:hover{background:#dc2626}
    .task{background:#fff;border-radius:10px;padding:1rem 1.2rem;margin-bottom:.75rem;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;gap:1rem;align-items:flex-start}
    .task.done .task-title{text-decoration:line-through;color:#aaa}
    .task input[type=checkbox]{width:18px;height:18px;margin-top:3px;accent-color:#4f46e5;cursor:pointer;flex-shrink:0}
    .task-body{flex:1}
    .task-title{font-weight:600;margin-bottom:.2rem}
    .task-desc{font-size:.85rem;color:#666}
    .task-date{font-size:.75rem;color:#bbb;margin-top:.3rem}
    .empty{text-align:center;color:#bbb;padding:2rem}
    .count{background:#ede9fe;color:#4f46e5;border-radius:20px;padding:.1rem .6rem;font-size:.75rem;font-weight:600;margin-left:.4rem}
  </style>
</head>
<body>
<div class="container">
  <h1>Task Manager <span>&#10003;</span></h1>
  <div class="card">
    <input id="title" type="text" placeholder="Task title..." />
    <textarea id="desc" placeholder="Description (optional)..."></textarea>
    <button onclick="addTask()">Add Task</button>
  </div>
  <div style="font-size:.95rem;color:#555;margin-bottom:.75rem;font-weight:500">
    Tasks <span class="count" id="count">0</span>
  </div>
  <div id="list"><div class="empty">No tasks yet</div></div>
</div>
<script>
async function load(){
  const r=await fetch('/api/tasks');
  const tasks=await r.json();
  document.getElementById('count').textContent=tasks.length;
  const el=document.getElementById('list');
  if(!tasks.length){el.innerHTML='<div class="empty">No tasks yet — add one above!</div>';return;}
  el.innerHTML=tasks.map(t=>`
    <div class="task ${t.done?'done':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggle(${t.id},this.checked)">
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        ${t.description?`<div class="task-desc">${esc(t.description)}</div>`:''}
        <div class="task-date">${new Date(t.created_at).toLocaleString()}</div>
      </div>
      <button class="danger" onclick="del(${t.id})">Delete</button>
    </div>`).join('');
}
async function addTask(){
  const title=document.getElementById('title').value.trim();
  const desc=document.getElementById('desc').value.trim();
  if(!title)return alert('Title is required');
  await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,description:desc})});
  document.getElementById('title').value='';
  document.getElementById('desc').value='';
  load();
}
async function toggle(id,done){
  await fetch(`/api/tasks/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({done})});
  load();
}
async function del(id){
  await fetch(`/api/tasks/${id}`,{method:'DELETE'});
  load();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
document.getElementById('title').addEventListener('keydown',e=>{if(e.key==='Enter')addTask()});
load();
</script>
</body>
</html>
